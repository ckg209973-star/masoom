<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #021d16;
    color: white;
    text-align: center;
    overflow: hidden;
}

/* Canvas background */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Glass container */
.container {
    max-width: 400px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,255,150,0.2);
}

/* Tag */
.tag {
    background: linear-gradient(90deg, #00ff99, #00c853);
    padding: 10px 20px;
    border-radius: 50px;
    display: inline-block;
    font-size: 14px;
    color: black;
    font-weight: bold;
}

h1 {
    font-size: 42px;
    margin: 20px 0 10px;
    letter-spacing: 4px;
    text-shadow: 0 0 15px rgba(0,255,150,0.6);
}

.subtext {
    color: #cfcfcf;
    font-size: 15px;
}

/* Timer */
.timer {
    font-size: 22px;
    margin: 20px 0;
}

.timer span {
    color: #00ffcc;
    font-weight: bold;
}

/* Button */
.btn {
    display: inline-block;
    background: linear-gradient(90deg, #00ff99, #00c853);
    color: black;
    padding: 18px 45px;
    border-radius: 50px;
    font-size: 20px;
    font-weight: bold;
    text-decoration: none;
    margin: 25px 0;
    box-shadow: 0 0 25px #00ff99;
    animation: zoom 1.5s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(0.9); }
    to { transform: scale(1.05); }
}

.btn:hover {
    box-shadow: 0 0 50px #00ffcc;
}

.info {
    color: #ccc;
    font-size: 14px;
}

.line {
    margin: 20px 0;
    border-top: 1px solid rgba(255,255,255,0.2);
}

.disclaimer {
    font-size: 13px;
    color: #aaa;
}
</style>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <div class="tag">🏏 Cricket Updates & Insights</div>

    <h1>LOAD BRAND</h1>

    <div class="subtext">
        Honest analysis • Match insights • Community driven
    </div>

    <div class="timer">
        FREE JOINING ENDS IN <span id="count">46</span>s
    </div>

    <!-- ✅ Button with Pixel Event -->
    <a href="https://t.me/+m3Zz7WbryVhiYzc9" class="btn" target="_blank"
       onclick="fbq('track','Lead');">
        Subscribe Free
    </a>

    <div class="info">
        Stay informed with transparent cricket analysis
    </div>

    <div class="line"></div>

    <div class="disclaimer">
        Disclaimer: This channel shares cricket updates and analysis. No guarantees.
    </div>

</div>

<script>
// Countdown
let time = 46;
let counter = document.getElementById("count");
setInterval(() => {
    if(time > 0){
        time--;
        counter.innerText = time;
    }
}, 1000);

// Particles animation
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0; i<80; i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: (Math.random()-0.5),
        dy: (Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ffcc";particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
